services:
  postgres:
    container_name: postres_container
    image : postgres:14.17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d anki_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s 
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - my_network

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - postgres
    networks:
      - my_network

  af:
    user: "${AIRFLOW_UID:-50000}:0"
    container_name: airflow_container
    build:
      context: ./airflow/
      dockerfile: Dockerfile
    image: apache/airflow:3.0.0
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ANKI_DB_ORIGIN: /mnt/anki_db_source/collection.anki2
      ANKI_DB_PATH: /opt/airflow/data/collection.anki2
 
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./python_scripts:/opt/airflow/python_scripts
      - ${ANKI_DB_SOURCE}:/mnt/anki_db_source:ro
      - ./airflow/data:/opt/airflow/data
    depends_on:
      - postgres
    networks:
      - my_network
    command: >
      bash -c "airflow db migrate && airflow standalone"

networks:
  my_network:
    driver: bridge
